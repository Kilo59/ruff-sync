[tool.poetry]
name = "readme_excludes"
version = "0.0.1.dev0"
description = "Test that the exact exclude paths from the README examples work correctly"
authors = ["Bob Baggins"]

[tool.poetry.dependencies]
python = "^3.9"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
# Local target-version — should be preserved by exclude
target-version = "py39"
line-length = 88

[tool.ruff.lint]
select = ["F", "E", "W"]
# Local ignores — should be preserved by exclude
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Local per-file-ignores — should be preserved by exclude
"tests/*.py" = ["S101"]

[tool.ruff.lint.isort]
# Local first-party packages — should be preserved by exclude
known-first-party = ["my_local_pkg"]

[tool.ruff.lint.flake8-tidy-imports]
# Local sub-table — should be preserved by exclude
banned-api = { "typing.List" = { msg = "Use list instead." } }

[tool.ruff.lint.pydocstyle]
# Local convention — should be preserved by exclude
convention = "numpy"
