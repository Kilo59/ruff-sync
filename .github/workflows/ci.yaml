name: ci

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  static-analysis:
    strategy:
      matrix:
        task: ["lint", "fmt", "type-check"]
      fail-fast: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - run: uv run invoke ${{ matrix.task }} --check

  tests:
    strategy:
      fail-fast: ${{ github.event.pull_request.draft == true }}
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Run tests
        run: uv run coverage run -m pytest -vv

      - name: Generate coverage report
        run: uv run coverage xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Kilo59/ruff-sync

  pre-publish:
    name: Test package installation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [static-analysis, tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.10

      - name: Build package
        run: uv build

      - name: Install and test packaged program
        run: |
          uv tool install $(ls dist/*.whl)
          ruff-sync --version
          ruff-sync https://github.com/Kilo59/ruff-sync
          ruff-sync check https://github.com/Kilo59/ruff-sync
          ! ruff-sync check --semantic https://github.com/Kilo59/ruff-sync --path configs/kitchen-sink

  publish:
    name: Build and publish to PyPI
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [pre-publish]
    runs-on: ubuntu-latest
    permissions:
      # This permission is required for trusted publishing
      id-token: write
      # This permission is required to read the repository content
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.10

      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish
