# Golden Sample Configuration for TUI Screenshots
# This file is used to generate documentation visuals that showcase all rule statuses.

[project]
name = "demo-project"
version = "1.2.3"
description = "A comprehensive Python project for demonstrating Ruff synchronization"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
# Select some diverse linters and specific rules
select = [
    "E",    # Enabled (some are fixable)
    "F",    # Enabled (some are fixable)
    "B",    # Enabled
    "T20",  # Enabled
]

# Explicitly ignore some rules to show 'Ignored' (Yellow) status in TUI
ignore = [
    "E402", # Module level import not at top of file
    "F401", # Unused import (this is fixable, but we ignore it to show Ignored)
    "T201", # print() found
]

# Use extend-select/ignore to show how these categories are merged
extend-select = [
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
]

extend-ignore = [
    "UP006", # Use `list` instead of `List` for type annotation
    "SIM101",# Combine multiple `isinstance` calls
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint.isort]
required-imports = ["from __future__ import annotations"]
