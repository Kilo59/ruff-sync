site_name: ruff-sync
site_description: Synchronize Ruff linter configuration across Python projects.
site_url: https://Kilo59.github.io/ruff-sync/

repo_name: Kilo59/ruff-sync
repo_url: https://github.com/Kilo59/ruff-sync
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: deep-purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.expand
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - navigation.path
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - css/termynal.css
  - css/custom.css

extra_javascript:
  - js/termynal.js
  - js/custom.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Kilo59/ruff-sync
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ruff-sync/

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - toc:
      permalink: true

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            show_if_no_docstring: true
            members_order: source
            separate_signature: true
            unwrap_annotated: true
            filters:
              - "!^_[^_]"

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage:
      - Usage: usage.md
      - Configuration: configuration.md
      - Pre-defined Configs: pre-defined-configs.md
      - Best Practices: best-practices.md
      - Pre-commit: pre-commit.md
      - CI Integration: ci-integration.md
  - Troubleshooting: troubleshooting.md
  - Contributing: contributing.md
  - API Reference: reference/
